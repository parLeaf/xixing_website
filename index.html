<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>西行数字史馆 · 林则徐西行路线</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
  <div id="navbar-container"></div>

  <section class="hero">
    <div class="hero-content">
      <h1>西行数字史馆</h1>
      <p class="subtitle">林则徐西行路线 · 1842年壬寅</p>
      <div class="hero-stats" id="hero-stats">
        <!-- 动态填充统计数据 -->
      </div>
    </div>
  </section>

  <div class="cards-container">
    <div class="card" onclick="location.href='map.html'">
      <i class="fas fa-map-marked-alt"></i>
      <h3>地图可视化</h3>
      <p>时间轴播放、分类筛选、路线动画</p>
      <span class="card-link">探索地图 →</span>
    </div>
    <div class="card" onclick="location.href='timeline.html'">
      <i class="fas fa-list-ul"></i>
      <h3>时间线</h3>
      <p>按月浏览 107 个地点，展开详实史料</p>
      <span class="card-link">浏览时间线 →</span>
    </div>
  </div>

  <div class="history-section">
    <div class="history-card">
      <i class="fas fa-book-open"></i>
      <h3>历史背景</h3>
      <p>1842 年，林则徐因鸦片战争被贬戍伊犁。从西安到伊犁的西行之路，他详细记录了沿途风物、人物与心境。本平台以数字化方式重现这段历史征程，整合路线、地点、人物与地方志信息。</p>
    </div>
  </div>

  <footer class="footer">
    <p>数据来源：《林则徐日记》1842年壬寅 | 西行数字史馆</p>
  </footer>

  <script src="data.js"></script>
  <script src="common.js"></script>
  <script>
    // 插入导航栏
    insertNavbar('home');
    
    // 动态显示统计数据
    if (typeof linZexuRouteData !== 'undefined') {
      const months = getRouteMonths();
      document.getElementById('hero-stats').innerHTML = `
        <span><i class="fas fa-map-marker-alt"></i> ${linZexuRouteData.length} 个地点</span>
        <span><i class="fas fa-calendar-alt"></i> ${months.length} 个月行程</span>
      `;
    }
  </script>
</body>
</html>
