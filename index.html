<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>林则徐西行路线图 - 完整交互式可视化</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="info">
        <h2><i class="fas fa-map-marked-alt" style="color:#e74c3c;"></i> 林则徐西行路线图 1842年壬寅</h2>
        <p>本图展示了林则徐在1842年农历七月至十二月从西安出发，经陕西、甘肃前往新疆伊犁的完整行程路线。</p>
        <div class="controls-container">
            <div>
                <button class="control-btn" id="toggle-markers"><i class="fas fa-map-marker-alt"></i> 切换标记点</button>
                <button class="control-btn" id="toggle-route"><i class="fas fa-route"></i> 切换路线</button>
                <button class="control-btn" id="reset-view"><i class="fas fa-globe-asia"></i> 重置视图</button>
                <button class="control-btn" id="toggle-months"><i class="fas fa-calendar-alt"></i> 显示月份分段</button>
            </div>
            <div>
                <button class="control-btn" id="export-btn"><i class="fas fa-download"></i> 导出数据</button>
            </div>
        </div>
    </div>
    
    <div id="map"></div>
    <!-- 脚本加载顺序：Leaflet → 数据 → 地图逻辑 -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <!-- 数据文件（必须使用 var 定义全局变量） -->
    <script src="data.js"></script>
    <script src="map.js"></script>
</body>
</html>
